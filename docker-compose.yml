services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ems_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-ems_db}
    volumes:
      - ../../data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ems_user -d ems_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ems_user}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-ems_db}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      TOKEN_EXPIRE_HOURS: ${TOKEN_EXPIRE_HOURS:-12}
      PRINTSHOP_TOKEN_HOURS: ${PRINTSHOP_TOKEN_HOURS:-72}
      APP_URL: ${APP_URL:-http://localhost}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      CRON_SECRET: ${CRON_SECRET:-change-me}
    ports:
      - "8000:8000"
    volumes:
      - ../../data/uploads:/app/uploads
      - ../../data/logs:/app/logs

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../data/ssl:/etc/nginx/ssl:ro
      - ../../data/logs/nginx:/var/log/nginx

  cron:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: ${POSTGRES_USER:-ems_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-ems_db}
      BACKUP_DEST: /data/ems/backups/db
      CRON_SECRET: ${CRON_SECRET:-change-me}
    command:
      - sh
      - -c
      - apk add --no-cache curl rsync tzdata >/dev/null && sh /scripts/cron.sh && crond -f -d 8
    volumes:
      - ../../data:/data/ems
      - ./scripts:/scripts:ro
