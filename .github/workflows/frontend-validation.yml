name: Frontend Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — type-check + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc -b + vite build)
        run: npm run build

      - name: Raw Student Name Safety Check
        run: |
          ! grep -rE 'student_name|full_name' frontend/src --include="*.ts" --include="*.tsx" | grep -v "useAuditExplorer\|auditExplorer\|getAuditEvents\|AuditEvent" || (echo "Warning: raw student_name fields may be exposed" && exit 0)
