name: Backend Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: sqlite:///./backend/ems_ci.db
  SECRET_KEY: ci-test-secret-key-not-for-production
  JSON_LOGS: "false"
  ALLOWED_ORIGINS: http://localhost:3000

jobs:
  backend:
    name: Backend — compile + import + test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Compile check (syntax errors)
        run: python -m compileall backend -q

      - name: Import check (startup smoke)
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'backend')
          import main
          print('import main: OK')
          "

      - name: Run backend tests
        run: python -m pytest backend/tests -q --tb=short
