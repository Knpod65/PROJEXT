# ── Rate-limit zones ──────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=login:10m  rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m    rate=60r/m;

# ── Hide nginx version ────────────────────────────────────────
server_tokens off;

# Re-resolve the Docker service name when the app container is recreated.
resolver 127.0.0.11 ipv6=off valid=30s;

# ══════════════════════════════════════════════════════════════
# HTTP — ใช้งานได้เลย (เปิด HTTPS block ด้านล่างเมื่อมี SSL cert)
# ══════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name ems.polsci.cmu.ac.th polsci.cmu.ac.th _;
    set $app_upstream http://app:8000;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"                         always;
    add_header X-Frame-Options         "SAMEORIGIN"                      always;
    add_header X-XSS-Protection        "1; mode=block"                   always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    # CSP — blocks inline script execution from injected payloads.
    # 'unsafe-inline' for style-src is required by the current CSS-in-HTML approach.
    # Remove 'unsafe-inline' from script-src once nonce/hash migration is complete.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;

    client_max_body_size 25m;

    # ── Login rate-limit เข้มกว่า ──────────────────────────────
    location = /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass         $app_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── API proxy ──────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         $app_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Health check (no rate limit) ──────────────────────────
    location = /health {
        proxy_pass $app_upstream;
        access_log off;
    }

    # ── Block direct upload access ────────────────────────────
    location /uploads/ {
        deny all;
        return 403;
    }

    # ── Static files + SPA ────────────────────────────────────
    location / {
        proxy_pass       $app_upstream;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Do not cache HTML — browser always fetches fresh copy
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma        "no-cache"                            always;
        add_header Expires       "0"                                   always;
    }

    access_log /var/log/nginx/ems_access.log;
    error_log  /var/log/nginx/ems_error.log warn;
}

