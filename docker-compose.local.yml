services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ""
      SECRET_KEY: ${SECRET_KEY:-change-me}
      TOKEN_EXPIRE_HOURS: ${TOKEN_EXPIRE_HOURS:-12}
      PRINTSHOP_TOKEN_HOURS: ${PRINTSHOP_TOKEN_HOURS:-72}
      APP_URL: ${APP_URL:-http://localhost}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      CRON_SECRET: ${CRON_SECRET:-change-me}
    ports:
      - "8000:8000"
    volumes:
      - ../../data/uploads:/app/uploads
      - ../../data/logs:/app/logs

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../data/ssl:/etc/nginx/ssl:ro
      - ../../data/logs/nginx:/var/log/nginx
